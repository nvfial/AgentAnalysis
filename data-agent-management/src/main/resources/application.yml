server:
  port: 8065

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

spring:
  application:
    name: nl2sql-assistant

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/nl2sql_assistant?useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&allowMultiQueries=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource

  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema.sql
      continue-on-error: true
      separator: ;
      encoding: utf-8

  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:your-api-key}

    vectorstore:
      type: elasticsearch
      elasticsearch:
        host: ${ELASTICSEARCH_HOST:127.0.0.1}
        port: ${ELASTICSEARCH_PORT:9200}
        username: ${ELASTICSEARCH_USERNAME:}
        password: ${ELASTICSEARCH_PASSWORD:}
        index-name: nl2sql_knowledge

  webflux:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true

nl2sql:
  graph:
    llm-service-type: stream
    max-sql-retry-count: 3
  vector-store:
    table-topk-limit: 10
    table-similarity-threshold: 0.2
    default-topk-limit: 8
    default-similarity-threshold: 0.4

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    com.example.nl2sql: debug
    org.springframework.jdbc: debug
